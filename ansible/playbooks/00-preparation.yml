---
- name: Preparation - install base packages
  hosts: notebook
  become: yes
  gather_facts: yes
  
  tasks:
    # # Обновляем все пакеты
    # - name: Update system packages
    #   dnf:
    #     name: "*"
    #     state: latest
    #   when: ansible_os_family == "RedHat"
      
    # Устанавливаем базовые утилиты
    - name: Install base packages
      dnf:
        name:
          - git
          - curl
          - wget
          - vim
          - htop
          - net-tools
          - telnet
          - nc
          - bind-utils
          - python3
          - python3-pip
          - python3-devel
        state: present