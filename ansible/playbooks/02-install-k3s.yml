---
- name: Install K3s
  hosts: notebook
  become: yes
  
  tasks:
    # Устанавливаем K3s
    - name: Install K3s
      shell: curl -sfL https://get.k3s.io | sh -
      args:
        creates: /usr/local/bin/k3s  # не запускать, если уже установлен
        
    # Ждем, пока K3s API сервер запустится
    - name: Wait for K3s API server
      command: /usr/local/bin/k3s kubectl get nodes
      register: result
      until: result.rc == 0
      retries: 20
      delay: 5
      
    # Создаем директорию для kubeconfig
    - name: Create .kube directory
      file:
        path: "/home/{{ ansible_user }}/.kube"
        state: directory
        owner: "{{ ansible_user }}"
        mode: '0755'
        
    # Копируем kubeconfig для пользователя
    - name: Copy kubeconfig
      copy:
        src: /etc/rancher/k3s/k3s.yaml
        dest: "/home/{{ ansible_user }}/.kube/config"
        remote_src: yes
        owner: "{{ ansible_user }}"
        mode: '0600'
        
    # Добавляем переменную окружения KUBECONFIG
    - name: Set KUBECONFIG in .bashrc
      lineinfile:
        path: "/home/{{ ansible_user }}/.bashrc"
        line: 'export KUBECONFIG=/home/{{ ansible_user }}/.kube/config'
        create: yes