[defaults]
# Путь к файлу инвентаря (список хостов)
inventory = inventory/hosts.ini

# Отключаем проверку ключей хостов (для тестов)
host_key_checking = False

# Не создаем файлы .retry при ошибках
retry_files_enabled = False

# Режим сбора фактов о системе (умный - собирает только нужное)
gathering = smart

# Формат вывода (yaml - читаемый)
stdout_callback = yaml

# Подключаем дополнительные плагины
callback_whitelist = profile_tasks

[ssh_connection]
# Параметры SSH для ускорения
ssh_args = -o ControlMaster=auto -o ControlPersist=60s
pipelining = True