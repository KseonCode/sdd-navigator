# @req REQ-INFRA-004 Frontend service
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-web
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "sdd-navigator.labels" . | nindent 4 }}
    component: web
spec:
  type: {{ .Values.web.service.type }}
  ports:
  - port: {{ .Values.web.service.port }}
    targetPort: {{ .Values.web.service.port }}
  selector:
    app: sdd-navigator
    component: web
