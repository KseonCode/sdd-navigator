# @req REQ-INFRA-002 API deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sdd-api
  namespace: {{ .Values.namespace }}
  labels:
    app: sdd-api
    component: backend
spec:
  replicas: {{ .Values.api.replicas }}
  selector:
    matchLabels:
      app: sdd-api
  template:
    metadata:
      labels:
        app: sdd-api
        component: backend
    spec:
      containers:
      - name: api
        image: "{{ .Values.api.image.repository }}:{{ .Values.api.image.tag }}"
        imagePullPolicy: {{ .Values.api.image.pullPolicy }}
        ports:
        - containerPort: {{ .Values.api.port }}
          name: http
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: DATABASE_URL
        - name: RUST_LOG
          valueFrom:
            configMapKeyRef:
              name: api-config
              key: RUST_LOG
        - name: PORT
          valueFrom:
            configMapKeyRef:
              name: api-config
              key: PORT
        resources:
          {{- toYaml .Values.api.resources | nindent 10 }}
        livenessProbe:
          httpGet:
            path: /health/live
            port: {{ .Values.api.port }}
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health/ready
            port: {{ .Values.api.port }}
          initialDelaySeconds: 5
          periodSeconds: 5