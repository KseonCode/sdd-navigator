# @req REQ-INFRA-003 PostgreSQL headless service
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-postgres
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "sdd-navigator.labels" . | nindent 4 }}
    component: postgres
spec:
  clusterIP: None
  ports:
  - port: {{ .Values.postgres.port }}
  selector:
    app: sdd-navigator
    component: postgres
