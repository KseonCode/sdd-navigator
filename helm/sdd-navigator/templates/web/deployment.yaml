# @req REQ-INFRA-004 Frontend deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sdd-web
  namespace: {{ .Values.namespace }}
  labels:
    app: sdd-web
    component: frontend
spec:
  replicas: {{ .Values.web.replicas }}
  selector:
    matchLabels:
      app: sdd-web
  template:
    metadata:
      labels:
        app: sdd-web
        component: frontend
    spec:
      containers:
      - name: web
        image: "{{ .Values.web.image.repository }}:{{ .Values.web.image.tag }}"
        imagePullPolicy: {{ .Values.web.image.pullPolicy }}
        ports:
        - containerPort: {{ .Values.web.port }}
          name: http
        env:
        - name: API_URL
          value: "http://sdd-api:{{ .Values.api.port }}"
        {{- range $key, $value := .Values.web.env }}
        - name: {{ $key }}
          value: {{ $value | quote }}
        {{- end }}
        resources:
          {{- toYaml .Values.web.resources | nindent 10 }}
        livenessProbe:
          httpGet:
            path: /
            port: {{ .Values.web.port }}
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: {{ .Values.web.port }}
          initialDelaySeconds: 5
          periodSeconds: 5