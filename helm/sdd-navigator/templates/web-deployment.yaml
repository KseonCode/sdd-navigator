# @req REQ-INFRA-004 Frontend deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-web
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "sdd-navigator.labels" . | nindent 4 }}
    component: web
spec:
  replicas: {{ .Values.web.replicaCount }}
  selector:
    matchLabels:
      app: sdd-navigator
      component: web
  template:
    metadata:
      labels:
        app: sdd-navigator
        component: web
    spec:
      containers:
      - name: web
        image: {{ .Values.web.image.repository }}:{{ .Values.web.image.tag }}
        imagePullPolicy: {{ .Values.web.image.pullPolicy }}
        ports:
        - containerPort: {{ .Values.web.service.port }}
        env:
        - name: NEXT_PUBLIC_API_URL
          value: http://{{ .Release.Name }}-api:{{ .Values.api.service.port }}
        resources:
          {{- toYaml .Values.web.resources | nindent 10 }}
