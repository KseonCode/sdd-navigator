services:
  postgres:
    image: postgres:15-alpine
    container_name: sdd-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER}" ]
    networks:
      - sdd-network

  api:
    build: ./app/api
    container_name: sdd-api
    environment:
      DATABASE_URL: ${API_DATABASE_URL}
      PORT: ${API_PORT}
    ports:
      - "${API_PORT}:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - sdd-network

  web:
    build: ./app/web
    container_name: sdd-web
    environment:
      API_URL: ${WEB_API_URL}
    ports:
      - "${WEB_PORT}:3000"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - sdd-network

networks:
  sdd-network:
    name: sdd-network

volumes:
  postgres_data:
