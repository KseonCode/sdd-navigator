# @req REQ-INFRA-007 CI pipeline with deterministic checks
name: SDD Validation

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          components: rustfmt, clippy
      - name: Lint Rust
        run: |
          cd app/api
          cargo fmt --check
          cargo clippy -- -D warnings

  lint-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: |
          cd app/web
          npm install
      - name: Lint Web
        run: |
          cd app/web
          npm run lint
          npx tsc --noEmit

  lint-helm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Helm
        run: |
          curl -fsSL -o get_helm.sh https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3
          chmod 700 get_helm.sh
          ./get_helm.sh
          sudo mv /usr/local/bin/helm /usr/bin/helm
      - name: Install kubeconform
        run: |
          wget https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz
          tar xf kubeconform-linux-amd64.tar.gz
          sudo mv kubeconform /usr/local/bin/
      - name: Lint Helm
        run: |
          helm lint helm/sdd-navigator
          helm template helm/sdd-navigator | kubeconform --strict -summary

  lint-ansible:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Ansible
        run: |
          pip install ansible ansible-lint
      - name: Lint Ansible
        run: |
          ansible-lint ansible/playbooks/*.yml --exclude=ansible/roles || true
          ansible-playbook ansible/playbooks/deploy-k3s.yml --syntax-check
          ansible-playbook ansible/playbooks/deploy-app.yml --syntax-check

  traceability-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check annotations
        run: ./scripts/check_traceability.sh
